<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Эллина & Андрей | Свадебное приглашение</title>

    <!-- Preconnect для улучшения загрузки шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Фоновая музыка -->
    <audio id="bg-music" loop preload="auto">
        <source src="{{ url_for('static', filename='song.mp3') }}" type="audio/mpeg">
        <!-- Добавляем fallback на случай, если основной файл не загрузился -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Круглая кнопка управления музыкой (старая) -->
    <button id="musicToggle" class="music-btn" aria-label="Включить/выключить музыку">
        <i class="fas fa-music"></i>
    </button>

    <!-- Навигационное меню -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-logo">Э&А</a>
            <div class="nav-menu" id="navMenu">
                <a href="#home" class="nav-link">Главная</a>
                <a href="#info" class="nav-link">О празднике</a>
                <a href="#schedule" class="nav-link">Расписание</a>
                <a href="#dresscode" class="nav-link">Дресс-код</a>
                <a href="#map" class="nav-link">Карта</a>
                <a href="/rsvp" class="nav-link nav-rsvp">Подтвердить</a>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Меню">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script>
        // ========== УПРАВЛЕНИЕ МУЗЫКОЙ ==========
        (function() {
            const music = document.getElementById('bg-music');
            const musicHeart = document.getElementById('musicHeart');
            const musicBtn = document.getElementById('musicToggle');
            let isPlaying = false;
            let musicStarted = false;

            // Функция для обновления состояния всех кнопок
            function updateMusicUI() {
                if (isPlaying) {
                    if (musicHeart) musicHeart.classList.add('playing');
                    if (musicBtn) musicBtn.classList.add('playing');
                } else {
                    if (musicHeart) musicHeart.classList.remove('playing');
                    if (musicBtn) musicBtn.classList.remove('playing');
                }
            }

            // Функция включения/выключения музыки
            function toggleMusic() {
                if (!music) return;

                if (isPlaying) {
                    music.pause();
                    isPlaying = false;
                } else {
                    music.play().then(() => {
                        isPlaying = true;
                        updateMusicUI();
                    }).catch(e => {
                        console.log('Ошибка воспроизведения:', e);
                        // Показываем пользователю, что нужно взаимодействие
                        if (musicBtn) musicBtn.style.opacity = '0.7';
                    });
                }
                updateMusicUI();
            }

            // Автозапуск после первого клика (браузеры блокируют автовоспроизведение)
            function startMusic() {
                if (musicStarted) return;
                musicStarted = true;

                music.play().then(() => {
                    isPlaying = true;
                    updateMusicUI();
                }).catch(e => {
                    console.log('Автовоспроизведение заблокировано. Нажмите на сердечко или кнопку музыки.');
                });

                // Удаляем обработчики после первого запуска
                document.body.removeEventListener('click', startMusic);
                if (musicHeart) musicHeart.removeEventListener('click', startMusic);
                if (musicBtn) musicBtn.removeEventListener('click', startMusic);
            }

            // Обработчик клика по новому сердечку (если существует)
            if (musicHeart) {
                musicHeart.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleMusic();
                });
            }

            // Обработчик клика по старой круглой кнопке
            if (musicBtn) {
                musicBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleMusic();
                });
            }

            // Запуск музыки при первом клике по странице
            document.body.addEventListener('click', startMusic);
        })();

        // ========== МОБИЛЬНОЕ МЕНЮ ==========
        (function() {
            const toggle = document.getElementById('navToggle');
            const menu = document.getElementById('navMenu');

            if (toggle && menu) {
                // Открытие/закрытие меню
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('active');
                });

                // Закрытие меню при клике вне его
                document.addEventListener('click', (e) => {
                    if (menu.classList.contains('active') && !menu.contains(e.target) && !toggle.contains(e.target)) {
                        menu.classList.remove('active');
                    }
                });
            }

            // Плавная прокрутка для якорных ссылок
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href && href.startsWith('#')) {
                        e.preventDefault();
                        const target = document.querySelector(href);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            if (menu) menu.classList.remove('active');
                        }
                    }
                });
            });
        })();
    </script>

    <script src="{{ url_for('static', filename='js/countdown.js') }}"></script>
</body>
</html>
