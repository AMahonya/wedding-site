<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эллина & Андрей | Свадебное приглашение</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Фоновая музыка -->
    <audio id="bg-music" loop preload="auto">
        <source src="{{ url_for('static', filename='song.mp3') }}" type="audio/mpeg">
        <!-- Замените ссылку выше на свою музыку -->
    </audio>

    <!-- Кнопка управления музыкой -->
    <button id="musicToggle" class="music-btn">
        <i class="fas fa-music"></i>
    </button>

    <!-- Навигационное меню -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-logo">Э&А</a>
            <div class="nav-menu" id="navMenu">
                <a href="#home" class="nav-link">Главная</a>
                <a href="#info" class="nav-link">О празднике</a>
                <a href="#schedule" class="nav-link">Расписание</a>
                <a href="#dresscode" class="nav-link">Дресс-код</a>
                <a href="#map" class="nav-link">Карта</a>
                <a href="/rsvp" class="nav-link nav-rsvp">Подтвердить</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

   <script>
    // Музыка
    const music = document.getElementById('bg-music');
    const musicHeart = document.getElementById('musicHeart');
    let isPlaying = false;

    // Функция для обновления состояния кнопки
    function updateMusicUI() {
        if (isPlaying) {
            musicHeart.classList.add('playing');
        } else {
            musicHeart.classList.remove('playing');
        }
    }

    // Автозапуск после первого клика (браузеры блокируют автовоспроизведение)
    function startMusic() {
        music.play().then(() => {
            isPlaying = true;
            updateMusicUI();
        }).catch(e => console.log('Автовоспроизведение заблокировано'));
        document.body.removeEventListener('click', startMusic);
        musicHeart.removeEventListener('click', startMusic);
    }

    // Обработчик клика по сердечку
    musicHeart.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) {
            music.pause();
            isPlaying = false;
        } else {
            music.play().then(() => {
                isPlaying = true;
            }).catch(e => console.log('Ошибка воспроизведения'));
        }
        updateMusicUI();
    });

    document.body.addEventListener('click', startMusic);

    // Мобильное меню
    const toggle = document.getElementById('navToggle');
    const menu = document.getElementById('navMenu');

    toggle.addEventListener('click', () => {
        menu.classList.toggle('active');
    });

    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.getAttribute('href').startsWith('#')) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                    menu.classList.remove('active');
                }
            }
        });
    });
</script>

    <script src="{{ url_for('static', filename='js/countdown.js') }}"></script>
</body>
</html>
